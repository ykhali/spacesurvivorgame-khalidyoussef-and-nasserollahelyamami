<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Survivor</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <!-- p5.js -->
    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>

    <!-- Game scripts -->
    <script src="particles.js"></script>
    <script src="vehicle.js"></script>
    <script src="snake.js"></script>
    <script src="food.js"></script>
    <script src="bullet.js"></script>
    <script src="asteroid.js"></script>
    <script src="obstacle.js"></script>
    <script src="ally.js"></script>
    <script src="enemy.js"></script>
    <script src="sound.js"></script>
    <script src="player.js"></script>
    <script src="sketch.js"></script>
</head>

<body>

    <div id="ui-container">

        <!-- START SCREEN -->
        <div id="start-screen" class="screen">
            <h1>SPACE SURVIVOR</h1>

            <div class="controls-box">
                <h2>CONTROLS</h2>

                <div class="control-row">
                    <span class="key">ZQSD / WASD</span>
                    <span class="action">Move</span>
                </div>

                <div class="control-row">
                    <span class="key">Arrow Keys</span>
                    <span class="action">Move</span>
                </div>

                <div class="control-row">
                    <span class="key">Mouse</span>
                    <span class="action">Aim</span>
                </div>

                <div class="control-row">
                    <span class="key">Left Click</span>
                    <span class="action">Shoot</span>
                </div>
            </div>

            <button id="start-btn">START MISSION</button>
        </div>

        <!-- GAME HUD -->
        <div id="game-ui" class="hidden">
            <div id="score">SCORE: 0</div>
            <div id="level">LEVEL: 1</div>

            <div id="health-bar">
                <div id="health-fill"></div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-screen" class="screen hidden">
            <h1>MISSION FAILED</h1>
            <p id="final-score">Score: 0</p>
            <button id="restart-btn">RETRY</button>
        </div>

    </div>

    <!-- AZERTY / QWERTY SAFE INPUT -->
    <script>
        const keysPressed = {};

        window.addEventListener("keydown", (e) => {
            keysPressed[e.code] = true;
        });

        window.addEventListener("keyup", (e) => {
            keysPressed[e.code] = false;
        });
    </script>

</body>
</html>
